version: "3.9"
services:
  storage:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - sazabi_data:/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  sazabi_data:
